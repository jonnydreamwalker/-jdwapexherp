<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Hardscape | JDW Apex Herp</title><meta name="theme-color" content="#000000"><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"><link rel="stylesheet" href="../assets/style.css"><script src="../assets/apex-bridge.js"></script><script>
if(!localStorage.getItem('jdw_cart'))localStorage.setItem('jdw_cart',JSON.stringify([]));
function updateCartCount(){var c=JSON.parse(localStorage.getItem('jdw_cart'))||[];document.querySelectorAll('.cart-count').forEach(function(b){b.innerText=c.reduce(function(s,i){return s+i.quantity;},0);});}
document.addEventListener('DOMContentLoaded',updateCartCount);
function addToCart(name,variant,price){var cart=JSON.parse(localStorage.getItem('jdw_cart'))||[];var ex=cart.find(function(i){return i.name===name&&i.variant===variant;});if(ex)ex.quantity++;else cart.push({name:name,variant:variant,price:price,quantity:1});localStorage.setItem('jdw_cart',JSON.stringify(cart));updateCartCount();alert(name+' added');}
function openCartModal(){var cart=JSON.parse(localStorage.getItem('jdw_cart'))||[];var list=document.getElementById('cart-items-list');var totalEl=document.getElementById('cart-grand-total');list.innerHTML='';if(!cart.length){list.innerHTML='<p class="text-zinc-500 text-center py-8">Cart empty.</p>';totalEl.innerText='$0.00';}else{var total=0;cart.forEach(function(item,i){total+=item.price*item.quantity;list.innerHTML+='<div class="flex justify-between p-3 bg-zinc-950 border border-zinc-800 rounded-xl"><span>'+item.name+' x'+item.quantity+'</span><button onclick="removeSingleCartItem('+i+')" class="text-red-400">X</button></div>';});totalEl.innerText='$'+total.toFixed(2);}document.getElementById('cart-modal').classList.remove('hidden');document.getElementById('cart-modal').classList.add('flex');}
function closeCartModal(){document.getElementById('cart-modal').classList.add('hidden');document.getElementById('cart-modal').classList.remove('flex');}
function removeSingleCartItem(i){var c=JSON.parse(localStorage.getItem('jdw_cart'))||[];c.splice(i,1);localStorage.setItem('jdw_cart',JSON.stringify(c));updateCartCount();openCartModal();}
</script></head><body class="bg-zinc-950 text-white">
<div class="bg-emerald-950 border-b border-emerald-900 text-center text-xs py-2 px-4 text-emerald-300/90">Premium hardscape. Florida warehouse. Live catalog via ApexFreePort.</div>

<a href="#" onclick="openCartModal();return false;" class="relative"><i class="fas fa-shopping-cart"></i><span class="cart-count absolute -top-2 -right-2 bg-emerald-600 text-[10px] px-1 rounded-full">0</span></a>
</div></nav>
<header class="h-[30vh] flex items-center justify-center bg-black"><div class="text-center px-6"><h1 class="text-4xl font-black">Hardscape</h1>
<p id="apex-bridge-status" class="text-zinc-500 text-sm mt-3">Connecting inventory…</p></div></header>
<section class="py-16 bg-zinc-900"><div class="max-w-7xl mx-auto px-6">
<h2 class="text-3xl font-black text-center mb-10 text-emerald-400">Live Catalog</h2>
<div id="apex-catalog" data-category="Hardscape" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</div></section>
<div id="cart-modal" class="fixed inset-0 bg-black/80 z-[70] hidden flex items-center justify-center p-4"><div class="bg-zinc-900 border border-emerald-900 rounded-2xl max-w-lg w-full p-6">
<div class="flex justify-between mb-6"><h3 class="text-xl font-bold text-emerald-400">Cart</h3><button onclick="closeCartModal()">&times;</button></div>
<div id="cart-items-list" class="space-y-3 mb-6"></div>
