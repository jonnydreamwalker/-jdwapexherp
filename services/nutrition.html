    <script>
        function toggleDropdown(event) { event.stopPropagation(); const d=document.getElementById('category-dropdown'); const a=document.getElementById('dropdown-arrow'); if(!d)return; d.classList.toggle('hidden'); if(a)a.innerText=d.classList.contains('hidden')?'▼':'▲'; }
        document.addEventListener('click', function(e) { const d=document.getElementById('category-dropdown'); const a=document.getElementById('dropdown-arrow'); if(d&&!d.contains(e.target)&&!e.target.closest('button')){d.classList.add('hidden');if(a)a.innerText='▼';} });
        function openCartModal() { let cart=JSON.parse(localStorage.getItem('jdw_cart'))||[]; let list=document.getElementById('cart-items-list'); let totalEl=document.getElementById('cart-grand-total'); list.innerHTML=''; if(cart.length===0){list.innerHTML='<p class="text-zinc-500 text-center py-8">Your cart is currently empty.</p>';totalEl.innerText='$0.00';}else{let total=0;cart.forEach((item,i)=>{total+=item.price*item.quantity;list.innerHTML+=`<div class="flex justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-xl"><div><h4 class="font-bold text-white">${item.name}</h4><p class="text-xs text-emerald-400">${item.variant} — $${item.price.toFixed(2)}</p><p class="text-xs text-zinc-500">QTY: ${item.quantity}</p></div><button onclick="removeSingleCartItem(${i})" class="text-zinc-600 hover:text-red-400"><i class="fas fa-trash-alt"></i></button></div>`;});totalEl.innerText='$'+total.toFixed(2);} document.getElementById('cart-modal').classList.remove('hidden'); }
        function closeCartModal() { document.getElementById('cart-modal').classList.add('hidden'); }
        function removeSingleCartItem(i) { let c=JSON.parse(localStorage.getItem('jdw_cart')); c.splice(i,1); localStorage.setItem('jdw_cart',JSON.stringify(c)); openCartModal(); updateCartCount(); }
        function clearAllCartItems() { localStorage.setItem('jdw_cart','[]'); openCartModal(); updateCartCount(); }
        function populatePayPalFormFields(form) { let cart=JSON.parse(localStorage.getItem('jdw_cart'))||[]; if(!cart.length){alert('Your cart is empty.');return false;} form.querySelectorAll('.dynamic-item').forEach(el=>el.remove()); cart.forEach((item,idx)=>{let n=idx+1;[['item_name_',item.name+' ('+item.variant+')'],['amount_',item.price.toFixed(2)],['quantity_',item.quantity]].forEach(([k,v])=>{let i=document.createElement('input');i.type='hidden';i.className='dynamic-item';i.name=k+n;i.value=v;form.appendChild(i);});}); return true; }
    </script>
