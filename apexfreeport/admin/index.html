<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexFreePort Control</title>
<meta name="robots" content="noindex">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
<header class="border-b border-emerald-900 bg-black sticky top-0 z-20">
  <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-3">
    <div>
      <p class="text-emerald-500 text-[10px] font-bold tracking-[0.3em] uppercase">JDW Apex</p>
      <h1 class="text-xl font-black text-emerald-400">ApexFreePort</h1>
      <p class="text-zinc-500 text-xs">Multi-store inventory bridge</p>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <span id="warehouse" class="text-zinc-500 text-xs"></span>
      <button type="button" id="btn-add" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded-lg text-xs font-bold uppercase">+ Product</button>
      <form method="POST" action="/logout"><button class="border border-zinc-700 px-3 py-1.5 rounded-lg text-xs uppercase">Logout</button></form>
    </div>
  </div>
  <div class="max-w-6xl mx-auto px-4 pb-0 flex gap-1 border-t border-zinc-900 pt-3" id="tabs">
    <button type="button" data-store="herp" class="tab-btn px-5 py-2.5 text-sm font-bold uppercase rounded-t-xl border border-b-0 border-zinc-800 bg-zinc-900 text-emerald-400">Herp</button>
    <button type="button" data-store="k9" class="tab-btn px-5 py-2.5 text-sm font-bold uppercase rounded-t-xl border border-b-0 border-zinc-800 bg-zinc-950 text-zinc-400">K9</button>
    <button type="button" data-store="feline" class="tab-btn px-5 py-2.5 text-sm font-bold uppercase rounded-t-xl border border-b-0 border-zinc-800 bg-zinc-950 text-zinc-400">Feline</button>
  </div>
</header>
<main class="max-w-6xl mx-auto px-4 py-8">
  <div class="mb-8 border-4 border-red-700 bg-red-950/40 rounded-3xl p-6 text-center shadow-[0_0_40px_rgba(220,38,38,0.35)]">
    <p class="text-red-400 text-xs font-black tracking-[0.35em] uppercase mb-1">Website inventory feed</p>
    <p id="store-label" class="text-white font-bold text-lg mb-2">Apex Herp</p>
    <p id="feed-status" class="text-zinc-300 text-sm mb-4">Checking…</p>
    <button type="button" id="btn-dont-touch"
      class="w-full max-w-xl mx-auto block bg-red-600 hover:bg-red-500 text-white font-black text-xl md:text-2xl tracking-widest uppercase py-8 px-6 rounded-2xl border-4 border-red-400 shadow-lg transition">
      DON'T TOUCH
    </button>
    <p class="text-zinc-500 text-xs mt-4 max-w-xl mx-auto">Each tab has its own feed. OFF = that website shows inventory offline. Other stores are unchanged.</p>
  </div>

  <p class="text-zinc-400 text-sm mb-4">Managing: <span id="active-name" class="text-emerald-400 font-bold">Apex Herp</span></p>
  <div class="overflow-x-auto bg-zinc-900 border border-emerald-900/40 rounded-2xl">
    <table class="w-full text-sm text-left">
      <thead class="text-xs text-zinc-500 uppercase bg-zinc-950">
        <tr>
          <th class="px-3 py-3">SKU</th>
          <th class="px-3 py-3">Name</th>
          <th class="px-3 py-3">Price</th>
          <th class="px-3 py-3">Qty</th>
          <th class="px-3 py-3">Category</th>
          <th class="px-3 py-3">Actions</th>
        </tr>
      </thead>
      <tbody id="body" class="divide-y divide-zinc-800"></tbody>
    </table>
  </div>
</main>

<div id="modal" class="fixed inset-0 bg-black/85 hidden items-center justify-center p-4 z-50 overflow-y-auto">
  <form id="form" class="bg-zinc-900 border border-emerald-900 rounded-2xl p-6 w-full max-w-lg space-y-3 my-8">
    <h3 id="form-title" class="text-lg font-bold text-emerald-400">Edit product</h3>
    <label class="block text-xs text-zinc-500">SKU</label>
    <input name="sku" required class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm">
    <label class="block text-xs text-zinc-500">Name</label>
    <input name="name" required class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm">
    <label class="block text-xs text-zinc-500">Description</label>
    <textarea name="description" rows="2" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm"></textarea>
    <div class="grid grid-cols-2 gap-2">
      <div>
        <label class="block text-xs text-zinc-500">Price (USD)</label>
        <input name="price" type="number" step="0.01" min="0" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-xs text-zinc-500">Qty</label>
        <input name="qty" type="number" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-2">
      <div>
        <label class="block text-xs text-zinc-500">Category</label>
        <input name="category" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm" placeholder="Hardscape / Food / Litter…">
      </div>
      <div>
        <label class="block text-xs text-zinc-500">Lane</label>
        <select name="lane" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm">
          <option value="direct">Direct (FL WH)</option>
          <option value="external">External</option>
        </select>
      </div>
    </div>
    <div>
      <label class="block text-xs text-zinc-500">Status</label>
      <select name="status" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm">
        <option value="active">Active</option>
        <option value="coming_soon">Coming soon</option>
        <option value="hold">Hold</option>
      </select>
    </div>
    <div>
      <label class="block text-xs text-zinc-500">Image URL</label>
      <input name="image" class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-xs text-zinc-500">Or upload photo</label>
      <input type="file" id="imgfile" accept="image/*" class="w-full text-xs text-zinc-400">
    </div>
    <div class="flex gap-2 pt-2">
      <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-500 font-bold uppercase text-xs py-3 rounded-xl">Save</button>
      <button type="button" id="btn-cancel" class="px-4 border border-zinc-700 rounded-xl text-xs uppercase">Cancel</button>
    </div>
  </form>
</div>

<script>
var STORE = "herp";

function showModal(show) {
  var m = document.getElementById("modal");
  if (show) { m.classList.remove("hidden"); m.classList.add("flex"); }
  else { m.classList.add("hidden"); m.classList.remove("flex"); }
}

function paintTabs() {
  document.querySelectorAll(".tab-btn").forEach(function (btn) {
    var on = btn.getAttribute("data-store") === STORE;
    btn.className = "tab-btn px-5 py-2.5 text-sm font-bold uppercase rounded-t-xl border border-b-0 " +
      (on ? "border-emerald-800 bg-zinc-900 text-emerald-400" : "border-zinc-800 bg-zinc-950 text-zinc-400 hover:text-zinc-200");
  });
}

function paintFeed(on, name) {
  document.getElementById("store-label").textContent = name || STORE;
  document.getElementById("active-name").textContent = name || STORE;
  var st = document.getElementById("feed-status");
  var btn = document.getElementById("btn-dont-touch");
  if (on) {
    st.innerHTML = '<span class="text-emerald-400 font-bold">FEED IS LIVE</span> — this website can pull inventory';
    btn.textContent = "DON'T TOUCH (FEED ON — CLICK TO KILL)";
    btn.className = "w-full max-w-xl mx-auto block bg-emerald-700 hover:bg-red-600 text-white font-black text-xl md:text-2xl tracking-widest uppercase py-8 px-6 rounded-2xl border-4 border-emerald-400 shadow-lg transition";
  } else {
    st.innerHTML = '<span class="text-red-400 font-bold">FEED IS OFF</span> — this website shows inventory offline';
    btn.textContent = "DON'T TOUCH (FEED OFF — CLICK TO GO LIVE)";
    btn.className = "w-full max-w-xl mx-auto block bg-red-600 hover:bg-red-500 text-white font-black text-xl md:text-2xl tracking-widest uppercase py-8 px-6 rounded-2xl border-4 border-red-400 shadow-lg transition";
  }
}

document.querySelectorAll(".tab-btn").forEach(function (btn) {
  btn.onclick = function () {
    STORE = btn.getAttribute("data-store");
    paintTabs();
    load();
  };
});

document.getElementById("btn-dont-touch").onclick = async function () {
  if (!confirm("Flip the website inventory feed for " + STORE.toUpperCase() + " only?")) return;
  var r = await fetch("/api/admin/public-feed", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ store: STORE }),
  });
  if (!r.ok) { alert("Failed — logged in?"); return; }
  var j = await r.json();
  paintFeed(!!j.publicFeed, document.getElementById("active-name").textContent);
};

async function load() {
  paintTabs();
  var r = await fetch("/api/inventory?store=" + encodeURIComponent(STORE));
  if (!r.ok) { location.href = "/login"; return; }
  var d = await r.json();
  document.getElementById("warehouse").textContent = d.warehouse || "";
  paintFeed(!!d.publicFeed, d.storeName || STORE);
  window.__ITEMS__ = d.items || [];
  document.getElementById("body").innerHTML = window.__ITEMS__.map(function (i) {
    return "<tr>" +
      "<td class=\"px-3 py-3 font-mono text-xs text-emerald-400\">" + i.sku + "</td>" +
      "<td class=\"px-3 py-3\">" + i.name + "</td>" +
      "<td class=\"px-3 py-3 font-bold text-emerald-400\">$" + (Number(i.price) || 0).toFixed(2) + "</td>" +
      "<td class=\"px-3 py-3 font-bold\">" + i.qty + "</td>" +
      "<td class=\"px-3 py-3 text-xs\">" + (i.category || "") + "</td>" +
      "<td class=\"px-3 py-3 whitespace-nowrap\">" +
      "<button type=\"button\" data-edit=\"" + i.sku + "\" class=\"bg-emerald-700 hover:bg-emerald-600 text-xs font-bold uppercase px-2 py-1 rounded mr-1\">Edit</button>" +
      "<button type=\"button\" data-plus=\"" + i.sku + "\" class=\"text-emerald-400 px-1\">+</button>" +
      "<button type=\"button\" data-minus=\"" + i.sku + "\" class=\"text-zinc-400 px-1\">−</button>" +
      "</td></tr>";
  }).join("") || "<tr><td colspan=\"6\" class=\"px-3 py-8 text-center text-zinc-500\">No products in this store yet. Click + Product.</td></tr>";

  document.querySelectorAll("[data-edit]").forEach(function (btn) {
    btn.onclick = function () { openEdit(btn.getAttribute("data-edit")); };
  });
  document.querySelectorAll("[data-plus]").forEach(function (btn) {
    btn.onclick = function () { adj(btn.getAttribute("data-plus"), 1); };
  });
  document.querySelectorAll("[data-minus]").forEach(function (btn) {
    btn.onclick = function () { adj(btn.getAttribute("data-minus"), -1); };
  });
}

async function adj(sku, delta) {
  await fetch("/api/inventory/adjust", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ store: STORE, sku: sku, delta: delta }),
  });
  load();
}

function openEdit(sku) {
  var i = (window.__ITEMS__ || []).find(function (x) { return x.sku === sku; });
  var f = document.getElementById("form");
  document.getElementById("form-title").textContent = i ? "Edit product" : "New product";
  f.reset();
  document.getElementById("imgfile").value = "";
  if (i) {
    f.sku.value = i.sku || "";
    f.name.value = i.name || "";
    f.description.value = i.description || "";
    f.price.value = i.price != null ? i.price : 0;
    f.qty.value = i.qty != null ? i.qty : 0;
    f.category.value = i.category || "";
    f.lane.value = i.lane || "direct";
    f.status.value = i.status || "active";
    f.image.value = i.image || "";
  }
  showModal(true);
}

document.getElementById("btn-add").onclick = function () {
  document.getElementById("form-title").textContent = "New product";
  document.getElementById("form").reset();
  document.getElementById("imgfile").value = "";
  showModal(true);
};
document.getElementById("btn-cancel").onclick = function () { showModal(false); };

document.getElementById("form").onsubmit = async function (e) {
  e.preventDefault();
  var f = e.target;
  var body = {
    store: STORE,
    sku: f.sku.value.trim(),
    name: f.name.value.trim(),
    description: f.description.value,
    price: Number(f.price.value) || 0,
    qty: Number(f.qty.value) || 0,
    category: f.category.value,
    lane: f.lane.value,
    status: f.status.value,
    image: f.image.value.trim(),
  };
  var res = await fetch("/api/inventory/item", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) { alert("Save failed"); return; }
  var file = document.getElementById("imgfile").files[0];
  if (file) {
    var dataUrl = await new Promise(function (resolve, reject) {
      var r = new FileReader();
      r.onload = function () { resolve(r.result); };
      r.onerror = reject;
      r.readAsDataURL(file);
    });
    await fetch("/api/inventory/image", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ store: STORE, sku: body.sku, dataUrl: dataUrl }),
    });
  }
  showModal(false);
  load();
};

load();
</script>
</body>
</html>
