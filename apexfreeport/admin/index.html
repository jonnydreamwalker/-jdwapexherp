<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#000000">
<title>Apex FreePort</title>
<link rel="icon" type="image/png" href="/uploads/apexfreeport-logo.png">
<style>
:root{--bg:#09090b;--line:#27272a;--text:#fafafa;--muted:#a1a1aa;--emerald:#34d399;--emerald-dim:#059669;--blue:#38bdf8;--red:#ef4444;--amber:#fbbf24}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#09090b;color:#fafafa;min-height:100vh}
header{position:sticky;top:0;z-index:40;background:#000;border-bottom:1px solid #27272a;padding:12px 16px}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
.brand{display:flex;align-items:center;gap:12px}
.brand img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:1px solid #333;background:#111}
h1{margin:0;font-size:1.1rem;color:#34d399;text-transform:uppercase;letter-spacing:.04em}
.sub{color:#a1a1aa;font-size:12px}
.slogan{color:#fbbf24;font-weight:700;font-size:14px;margin:12px 0}
.slogan.live{color:#34d399}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tabs,.chips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tab,.chip{border:1px solid #27272a;background:#18181b;color:#a1a1aa;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer}
.tab.active,.chip.active{background:#34d399;color:#022c22;border-color:transparent}
button{font:inherit;cursor:pointer;border:0;border-radius:10px;padding:8px 12px;font-weight:700;color:#fff;background:#059669}
button.secondary{background:#27272a;color:#e4e4e7}
button.ghost{background:transparent;border:1px solid #27272a;color:#a1a1aa;padding:4px 8px;font-size:12 insx}
button.del,button.danger{background:linear-gradient(180deg,#f87171,#b91c1c)!important;color:#fff!important}
.feed-btn{width:100%;max-width:420px;padding:14px;font-size:14px;text-transform:uppercase;margin:8px 0 14px}
#status{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:10px 12px;font-size:13px;color:#a1a1aa;margin:8px 0;white-space:pre-wrap}
#status.err{border-color:#7f1d1d;color:#fecaca;background:#450a0a}
#status.ok{border-color:#14532d;color:#bbf7d0;background:#052e16}
table{width:100%;border-collapse:collapse;margin-top:8px}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid #27272a;vertical-align:top;font-size:13px}
th{color:#34d399;font-size:11px;text-transform:uppercase}
.sku{color:#38bdf8;font-family:ui-monospace,monospace;font-size:12px}
.modal-back{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:90;align-items:center;justify-content:center;padding:16px}
.modal-back.open{display:flex}
.modal{background:#000;border:1px solid #27272a;border-radius:16px;padding:18px;width:min(520px,100%);max-height:90vh;overflow:auto;color:#fafafa}
.modal h2{margin:0 0 8px;color:#34d399;font-size:1rem;text-transform:uppercase}
.modal h2.danger{color:#ef4444}
.modal h2.warn{color:#fbbf24}
.modal p{color:#d4d4d8;font-size:14px}
label{display:block;font-size:11px;color:#a1a1aa;margin:8px 0 4px;text-transform:uppercase}
input,select,textarea{width:100%;background:#000!important;color:#fafafa!important;border:1px solid #27272a;border-radius:10px;padding:9px 10px;font:inherit}
textarea{min-height:70px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.inline-edit{display:none}
.inline-edit.open{display:table-row}
.inline-box{background:#000;border:1px solid #1e3a5f;border-radius:12px;padding:12px;margin-bottom:8px}
a{color:#38bdf8}
</style>
</head>
<body>
<header>
  <div class="wrap row" style="justify-content:space-between">
    <div class="brand">
      <img src="/uploads/apexfreeport-logo.png" alt="logo" onerror="this.style.background='#111'">
      <div>
        <h1>Apex FreePort</h1>
        <div class="sub" id="meta">Starting…</div>
      </div>
    </div>
    <div class="row">
      <a href="https://jdwapexherp.com" target="_blank" rel="noopener">Herp site</a>
      <form method="POST" action="/logout" style="display:inline"><button type="submit" class="secondary">Logout</button></form>
    </div>
  </div>
</header>
<div class="wrap">
  <div class="slogan" id="slogan">Flip the switch.</div>
  <div class="tabs" id="storeTabs"></div>
  <button type="button" class="danger feed-btn" id="btnFeed">DON'T TOUCH · Public feed</button>
  <div class="row">
    <button type="button" id="btnAdd">+ Product</button>
    <button type="button" class="secondary" id="btnCat">+ Category</button>
    <button type="button" class="secondary" id="btnReload">Reload</button>
  </div>
  <div class="chips" id="catChips"></div>
  <div id="status">Loading inventory…</div>
  <table>
    <thead><tr><th>Order</th><th>SKU / Name</th><th>Category</th><th>Price</th><th>Qty</th><th>Actions</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="6" class="sub">Waiting…</td></tr></tbody>
  </table>
</div>
<script>
(function(){
var store="herp",items=[],categories=[],filterCat="",openSku="",publicFeed=false,pending=null;
function $(id){return document.getElementById(id);}
function setStatus(msg,kind){var el=$("status");el.textContent=msg;el.className=kind==="err"?"err":(kind==="ok"?"ok":"");el.id="status";}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function api(url,opts){opts=opts||{};opts.credentials="same-origin";opts.headers=opts.headers||{};if(opts.body&&typeof opts.body==="object"){opts.headers["Content-Type"]="application/json";opts.body=JSON.stringify(opts.body);}return fetch(url,opts).then(function(r){if(r.status===401){setStatus("Not logged in — redirecting…","err");location.href="/login";throw new Error("401");}return r.text().then(function(txt){var j=null;try{j=txt?JSON.parse(txt):{};}catch(e){throw new Error("Bad JSON from "+url+": "+txt.slice(0,120));}if(!r.ok)throw new Error((j&&j.error)||("HTTP "+r.status));return j;});});}
function load(){setStatus("Loading inventory for store: "+store+" …");$("meta").textContent="Loading…";return api("/api/inventory?store="+encodeURIComponent(store)).then(function(d){items=Array.isArray(d.items)?d.items:[];categories=Array.isArray(d.categories)?d.categories:[];publicFeed=!!d.publicFeed;renderTabs(d.stores);renderChips();renderTable();updateSlogan();$("btnFeed").textContent="DON'T TOUCH · Public feed "+(publicFeed?"ON":"OFF");$("meta").textContent=(d.storeName||store)+" · "+items.length+" items · feed "+(publicFeed?"ON":"OFF");setStatus("Loaded "+items.length+" products · store "+store+" · feed "+(publicFeed?"ON":"OFF"),"ok");}).catch(function(e){setStatus("Load failed: "+e.message,"err");$("meta").textContent="Load failed";$("tbody").innerHTML='<tr><td colspan="6" style="color:#fecaca">Could not load inventory.</td></tr>';});}
function updateSlogan(){var el=$("slogan");if(publicFeed){el.textContent="jdwapexherp.com feed is LIVE for this store.";el.className="slogan live";}else{el.textContent="Flip the switch.";el.className="slogan";}}
function renderTabs(stores){var el=$("storeTabs");el.innerHTML="";(stores||[{id:"herp",name:"Apex Herp",count:items.length},{id:"k9",name:"Apex K9",count:0},{id:"feline",name:"Apex Feline",count:0}]).forEach(function(s){var b=document.createElement("button");b.type="button";b.className="tab"+(s.id===store?" active":"");b.textContent=(s.name||s.id)+" ("+(s.count!=null?s.count:0)+")";b.onclick=function(){store=s.id;openSku="";filterCat="";load();};el.appendChild(b);});}
function renderChips(){var el=$("catChips");el.innerHTML="";function chip(label,val){var b=document.createElement("button");b.type="button";b.className="chip"+(filterCat===val?" active":"");b.textContent=label;b.onclick=function(){filterCat=val;renderTable();renderChips();};el.appendChild(b);}chip("All","");categories.forEach(function(c){chip(c,c);});}
function renderTable(){var tb=$("tbody");var list=items.filter(function(it){return !filterCat||String(it.category||"")===filterCat;});if(!list.length){tb.innerHTML='<tr><td colspan="6" style="color:#a1a1aa">No products in this view.</td></tr>';return;}var html="";list.forEach(function(it){html+='<tr data-sku="'+esc(it.sku)+'"><td></td><td><div class="sku">'+esc(it.sku)+'</div><strong>'+esc(it.name)+'</strong></td><td>'+esc(it.category||"")+'</td><td>$'+(Number(it.price)||0).toFixed(2)+'</td><td><button type="button" class="ghost" data-act="minus">−</button> <strong>'+(it.qty||0)+'</strong> <button type="button" class="ghost" data-act="plus">+</button></td><td><button type="button" class="secondary" data-act="edit">Edit</button> <button type="button" class="del" data-act="del">Delete</button></td></tr>';});tb.innerHTML=html;tb.querySelectorAll("[data-act]").forEach(function(btn){btn.onclick=function(){var act=btn.getAttribute("data-act");var tr=btn.closest("tr");var sku=tr.getAttribute("data-sku");if(act==="plus"||act==="minus"){api("/api/inventory/adjust",{method:"POST",body:{store:store,sku:sku,delta:act==="plus"?1:-1}}).then(load).catch(function(e){setStatus(e.message,"err");});}if(act==="del"){if(!confirm("Delete "+sku+"?"))return;api("/api/inventory/remove",{method:"POST",body:{store:store,sku:sku}}).then(load).catch(function(e){setStatus(e.message,"err");});}if(act==="edit"){var name=prompt("Name",tr.querySelector("strong").textContent);if(name==null)return;var price=prompt("Price");var qty=prompt("Qty");api("/api/inventory/item",{method:"POST",body:{store:store,sku:sku,name:name,price:Number(price)||0,qty:Number(qty)||0}}).then(load).catch(function(e){setStatus(e.message,"err");});}};});}
$("btnReload").onclick=function(){load();};
$("btnFeed").onclick=function(){var next=!publicFeed;if(!confirm(next?"Go LIVE on website?":"Turn public feed OFF?"))return;api("/api/admin/public-feed",{method:"POST",body:{store:store,enabled:next}}).then(load).catch(function(e){setStatus(e.message,"err");});};
$("btnAdd").onclick=function(){var sku=prompt("SKU");if(!sku)return;var name=prompt("Name");if(!name)return;var price=prompt("Price","0");var qty=prompt("Qty","0");api("/api/inventory/item",{method:"POST",body:{store:store,sku:sku.trim(),name:name.trim(),price:Number(price)||0,qty:Number(qty)||0,category:"Hardscape",lane:"direct",status:"active"}}).then(load).catch(function(e){setStatus(e.message,"err");});};
$("btnCat").onclick=function(){var name=prompt("Category name");if(!name)return;api("/api/inventory/category",{method:"POST",body:{store:store,name:name.trim()}}).then(load).catch(function(e){setStatus(e.message,"err");});};
setStatus("Booting…");
load();
})();
</script>
</body>
</html>
